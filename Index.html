<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <title>מחשבון בטון פולימרי</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 20px; background-color: #f8f9fa; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 450px; border: 1px solid #eee; }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 30px; font-size: 24px; }
        .form-group { margin-bottom: 20px; text-align: right; }
        label { display: block; margin-bottom: 10px; font-weight: 600; color: #555; font-size: 14px; }
        select { width: 100%; padding: 15px; border: 2px solid #eaeeef; border-radius: 12px; font-size: 16px; background-color: #fdfdfd; cursor: pointer; transition: border-color 0.2s; }
        select:focus { border-color: #3498db; outline: none; }
        .result-box { margin-top: 30px; padding: 20px; background: #f0f7ff; border-radius: 15px; display: none; border: 1px solid #d1e9ff; }
        .result-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .result-label { font-size: 16px; color: #444; }
        .result-value { font-size: 22px; font-weight: 800; color: #2980b9; }
        .divider { height: 1px; background: #d1e9ff; margin: 15px 0; }
        .loading { text-align: center; color: #999; padding: 40px 0; }
    </style>
</head>
<body>

<div class="card">
    <h2>מחשבון יציקה</h2>
    
    <div id="loader" class="loading">מתחבר לגיליון הנתונים...</div>

    <div id="mainContent" style="display: none;">
        <div class="form-group">
            <label>בחר תבנית:</label>
            <select id="moldSelect"></select>
        </div>

        <div class="form-group">
            <label>סוג אבקה:</label>
            <select id="materialSelect"></select>
        </div>

        <div id="resultArea" class="result-box">
            <div class="result-item">
                <span class="result-label">כמות מים</span>
                <span id="waterVal" class="result-value">0</span>
            </div>
            <div class="divider"></div>
            <div class="result-item">
                <span class="result-label">כמות אבקה</span>
                <span id="powderVal" class="result-value">0</span>
            </div>
        </div>
    </div>
</div>

<script>
    const moldsURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQNkPRkFQfmrcT104MzjqRSo48J2z2MAnDfn_u_PE-WetlpTHOzajlLkBAosCG0Z5wiW-jwWGfnmaph/pub?gid=0&single=true&output=csv";
    const materialsURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQNkPRkFQfmrcT104MzjqRSo48J2z2MAnDfn_u_PE-WetlpTHOzajlLkBAosCG0Z5wiW-jwWGfnmaph/pub?gid=2012837645&single=true&output=csv";

    let molds = [];
    let materials = [];

    async function loadData() {
        try {
            const [resMolds, resMats] = await Promise.all([
                fetch(moldsURL),
                fetch(materialsURL)
            ]);

            const textMolds = await resMolds.text();
            const textMats = await resMats.text();

            molds = parseCSV(textMolds).map(row => ({
                name: row[0],
                volume: parseFloat(row[1])
            })).filter(item => !isNaN(item.volume) && item.name);

            materials = parseCSV(textMats).map(row => ({
                name: row[0],
                wRatio: parseFloat(row[1]),
                pRatio: parseFloat(row[2])
            })).filter(item => !isNaN(item.wRatio) && item.name);

            initApp();
        } catch (err) {
            document.getElementById('loader').innerText = "שגיאה בחיבור לנתונים. וודא שהגיליון פתוח לצפייה.";
        }
    }

    function parseCSV(text) {
        return text.split('\n').slice(1).map(row => {
            // טיפול בגרשיים אם יש בשמות
            return row.split(',').map(cell => cell.replace(/["']/g, "").trim());
        });
    }

    function initApp() {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';

        const mSelect = document.getElementById('moldSelect');
        const matSelect = document.getElementById('materialSelect');

        // מיון תבניות לפי א-ב
        molds.sort((a, b) => a.name.localeCompare(b.name, 'he'));

        mSelect.innerHTML = molds.map(m => `<option value="${m.volume}">${m.name} (${m.volume}g)</option>`).join('');
        matSelect.innerHTML = materials.map(m => `<option value="${m.wRatio}|${m.pRatio}">${m.name}</option>`).join('');

        mSelect.addEventListener('change', calculate);
        matSelect.addEventListener('change', calculate);

        calculate();
    }

    function calculate() {
        const volume = parseFloat(document.getElementById('moldSelect').value);
        const [wRatio, pRatio] = document.getElementById('materialSelect').value.split('|').map(parseFloat);

        if (volume && wRatio) {
            const water = (volume * wRatio).toFixed(1);
            const powder = (volume * pRatio).toFixed(1);

            document.getElementById('waterVal').innerText = water + " גרם";
            document.getElementById('powderVal').innerText = powder + " גרם";
            document.getElementById('resultArea').style.display = 'block';
        }
    }

    loadData();
</script>

</body>
</html>
